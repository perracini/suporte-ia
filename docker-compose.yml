services:
  postgres:
    image: postgres:16-alpine
    container_name: suporte-postgres
    environment:
      POSTGRES_DB: suporte
      POSTGRES_USER: suporte
      POSTGRES_PASSWORD: suporte
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U suporte"]
      interval: 5s
      timeout: 3s
      retries: 10

  kafka:
    image: apache/kafka:3.8.0
    container_name: suporte-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: "ZmFrZS1jbHVzdGVyLWlkLXN1cG9ydGUtaWE="

  ollama:
    image: ollama/ollama:latest
    container_name: suporte-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama

  app:
    build: .
    container_name: suporte-app
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      ollama:
        condition: service_started
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: suporte
      DB_USER: suporte
      DB_PASSWORD: suporte
      KAFKA_BOOTSTRAP: kafka:9092
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: llama3.2
      JWT_SECRET: ZmFrZS1zZWNyZXQta2V5LWZvci1kZXYtb25seS1jaGFuZ2UtbWU=
    ports:
      - "8080:8080"

volumes:
  postgres-data:
  ollama-data:
