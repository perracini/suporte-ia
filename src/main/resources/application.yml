spring:
  application:
    name: suporte-ia
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:suporte}
    username: ${DB_USER:suporte}
    password: ${DB_PASSWORD:suporte}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: true
    properties:
      hibernate:
        format_sql: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
    consumer:
      group-id: suporte-ia
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "com.eneng.suporte.*"
        spring.json.use.type.headers: false
        spring.json.value.default.type: com.eneng.suporte.messaging.TicketCreatedEvent
      auto-offset-reset: earliest

app:
  embedded:
    enabled: ${APP_EMBEDDED:true}
  security:
    jwt:
      secret: ${JWT_SECRET:ZmFrZS1zZWNyZXQta2V5LWZvci1kZXYtb25seS1jaGFuZ2UtbWU=}
      expiration-minutes: 120
  llama:
    base-url: ${OLLAMA_URL:http://localhost:11434}
    model: ${OLLAMA_MODEL:llama3.2}
    timeout-seconds: 30
    rate-limiter:
      permits: 3
      acquire-timeout-seconds: 5
  kafka:
    topics:
      ticket-created: ticket.created
      ticket-created-dlt: ticket.created.DLT
    retry:
      initial-interval-ms: 1000
      multiplier: 2.0
      max-interval-ms: 10000
      max-attempts: 4

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

logging:
  level:
    com.eneng.suporte: DEBUG
    org.springframework.kafka: INFO
